---
- name: 'Configure chronyd from template'
  ansible.builtin.template:
    src: templates/chrony_server.j2
    dest: /etc/chrony.conf
    owner: root
    group: root
    mode: 0440
  when: 
    - ansible_os_family == 'RedHat'
  tags: 
    - base_services
  notify: 
     - restart_chrony 

- name: 'Ensure /mnt/plex_data nfs mount directory exists'
  ansible.builtin.file:
    path: '{{ nfs_dst_path }}'
    owner: root
    group: root
    mode: 0777
    state: directory
  when: 
    - nfs_enabled|bool == True 
    - ansible_os_family == 'RedHat'
    - ansible_hostname == 'plex'
  tags: 
    - base_services
    - setup_nfs
    
- name: 'Configuring Plex NFS Mounts on host'
  ansible.builtin.mount: 
    fstype: nfs
    path: '{{ nfs_dst_path }}'
    src: '{{ nfs_src_host }}:{{ nfs_src_path }}'
    state: mounted
  when: 
    - nfs_enabled|bool == True 
    - ansible_os_family == 'RedHat'
    - ansible_hostname == 'plex'
  tags: 
    - base_services
    - setup_nfs
 
- name: 'Setup Plex yum repo from template'
  ansible.builtin.copy:
    src: files/plex.repo
    dest: /etc/yum.repos.d/plex.repo
    owner: root
    group: root
    mode: 0644
  when: 
    - ansible_os_family == 'RedHat'
  tags: 
    - base_services
 
- name: 'Ensure base services are enabled and started'
  ansible.builtin.service:
    name: '{{ item }}'
    state: started
    enabled: yes
  loop: '{{ base_services }}'
  when: 
    - ansible_os_family == 'RedHat'
  tags: 
    - base_services
 
