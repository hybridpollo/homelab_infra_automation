---
# all variables
# this are currently defined in the playbook
# domain:
# base_hostname: 

sudo_group: sudo

time_servers:
   - clock.nyc.he.net
   - clock.fmt.he.net

user_list:
  - user_name: arlaporte
    uid: 1001

group_list:
  - group_name: sudo
    gid: 27
  - group_name: arlaporte 
    gid: 1001

reboot_after_updates: true

rhel_pkgs_to_install:
  - openssh-clients
  - openssh-server
  - chrony
  - curl
  - wget
  - tcpdump
  - iproute
  - firewalld
  - sysstat
  - ethtool
  - nfs-utils
  - epel-release
  - bind-utils
  - ipa-client

rhel_pkgs_to_remove:
  - postfix
  - ntpd
  - cloud-init
  
base_services:
  - chronyd
  - sshd
  - firewalld

# THIS IS WORK IN PROGRESS
# planning to use this to render 
# a default Preferences.xml file 
# when bootstrapping a new plex server
pms_allowed_local_networks:
  - network: 192.168.9.0
    netmask: 255.255.255.0
  - network: 192.168.10.0
    netmask: 255.255.255.0
# THIS IS WORK IN PROGRESS

pms_ports:
  - proto: tcp
    port: 32400
  - proto: tcp
    port: 3005 
  - proto: tcp
    port: 8324
  - proto: tcp
    port: 32469 
  - proto: udp
    port: 1900
  - proto: udp
    port: 5353
  - proto: udp
    port: 32410
  - proto: udp
    port: 32410
  - proto: udp
    port: 32412
  - proto: udp
    port: 32413
  - proto: udp
    port: 32414

### nfs options
nfs_enabled: yes
nfs_dst_path: /mnt/plex_data
nfs_src_host: 172.25.54.100
nfs_src_path: /lv_data/plex_data
